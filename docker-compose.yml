version: '3.8'

services:
  fastapi-1:
    build: ./apps/python
    container_name: fastapi-1
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      - APP_NAME=fastapi-1
    networks:
      - app-network

  fastapi-2:
    build: ./apps/python
    container_name: fastapi-2
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      - APP_NAME=fastapi-2
    networks:
      - app-network

  fastapi-3:
    build: ./apps/python
    container_name: fastapi-3
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      - APP_NAME=fastapi-3
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fastapi-1
      - fastapi-2
      - fastapi-3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
