services:
  fastapi:
    build: ./apps/python
    container_name: fastapi
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      - APP_NAME=fastapi
    networks:
      - app-network

  api-gw:
    build:
      context: .
      dockerfile: apps/node/Dockerfile
    container_name: api-gw
    expose:
      - "3000"
    environment:
      - APP_NAME=api-gw
      - PORT=3000
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fastapi
      - api-gw
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
