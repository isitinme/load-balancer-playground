resolver 127.0.0.11:53 valid=10s ipv6=off;

upstream backend_pool {
    # mostly sticks to one replice unless it gets overloaded
    # least_conn;

    # max_fails: Number of 429s (or other errors) allowed before marking server down
    # fail_timeout: Period the server is marked offline and request attempts cease

    # server fastapi:8000 max_fails=3 fail_timeout=30s weight=1;
    server api-gw:3000 max_fails=3 fail_timeout=30s weight=1;
}



# Test cases:
# 1. Single Point of Failure: whether load balancer will route traffic off the dead server
# 2. Server overload: whether load balancer will handle error/timeout/429 properly with marking a server

# Uncomment the split_clients section below to test round-robin instead
# By default upstream's strategy is already - round-robin. split_clients directive allows more configurable distribution
# split_clients $scheme$request_time$msec $backend {
#     50% "http://fastapi:8000";
#     * "http://node-app:3000";
# }

server {
    listen 80;
    server_name localhost;

    location / {
        # proxy_pass: http://backend_pool - route traffic using upstream directive
        # proxy_pass: $backend - route traffic using split_clients directive
        proxy_pass http://backend_pool;
        # proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location /api/ {
        proxy_pass http://backend_pool;
        # proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
}
